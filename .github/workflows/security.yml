name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:17 UTC. Catches new advisories against pinned deps even
    # when no PR/push has landed in days.
    - cron: "17 6 * * *"

permissions:
  contents: read
  security-events: write   # CodeQL upload

jobs:
  # -----------------------------------------------------------------
  # Dependency vulnerability scans (backend + frontend).
  # Fails on any HIGH or CRITICAL advisory.
  # -----------------------------------------------------------------
  deps:
    name: dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/Servicedesk.Web/package-lock.json

      - name: Restore .NET
        run: dotnet restore Servicedesk.slnx

      - name: dotnet — list vulnerable transitive packages
        id: nuget
        run: |
          set -o pipefail
          REPORT=$(dotnet list Servicedesk.slnx package --vulnerable --include-transitive 2>&1 || true)
          echo "$REPORT"
          echo "$REPORT" > nuget-vuln.txt
          # Fail when High or Critical appears anywhere in the report.
          if grep -E '\b(High|Critical)\b' nuget-vuln.txt; then
            echo "::error::High or Critical vulnerable NuGet package detected."
            exit 1
          fi

      - name: npm install (frontend)
        working-directory: src/Servicedesk.Web
        run: npm ci

      - name: npm audit (frontend) — fail on high
        working-directory: src/Servicedesk.Web
        run: |
          # --audit-level=high makes npm exit non-zero on high+ findings;
          # --omit=dev keeps the focus on what actually ships in the bundle.
          npm audit --omit=dev --audit-level=high

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-scan-reports
          path: |
            nuget-vuln.txt

  # -----------------------------------------------------------------
  # GitHub CodeQL — semantic SAST for both stacks.
  # -----------------------------------------------------------------
  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
          - language: javascript-typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        if: matrix.language == 'csharp'
        with:
          dotnet-version: "8.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Build (.NET)
        if: matrix.language == 'csharp'
        run: dotnet build Servicedesk.slnx --configuration Release

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # -----------------------------------------------------------------
  # OWASP ZAP baseline — passive scan of a freshly-booted container.
  # Authenticated active scan is out of scope for CI (needs seeded
  # users + long runtime); the baseline still surfaces missing-headers,
  # information disclosure, and obvious XSS/redirect smells.
  # -----------------------------------------------------------------
  zap:
    name: zap baseline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sd_ci
          POSTGRES_PASSWORD: ci_stub_password
          POSTGRES_DB: servicedesk_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sd_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app image
        run: |
          docker build \
            --build-arg APP_VERSION="0.0.0-zap" \
            --tag servicedesk/app:zap \
            .

      - name: Boot app
        run: |
          docker run -d --name sd \
            --network host \
            -e SERVICEDESK_ConnectionStrings__Postgres="Host=127.0.0.1;Port=5432;Database=servicedesk_ci;Username=sd_ci;Password=ci_stub_password" \
            -e SERVICEDESK_Audit__HashKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            -e SERVICEDESK_DataProtection__MasterKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            servicedesk/app:zap

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/system/version > /dev/null; then
              echo "boot ok"
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8080/api/system/version || (docker logs sd && exit 1)

      - name: ZAP baseline scan
        # The baseline action runs ZAP's passive rules against the target,
        # exits non-zero only on WARN-or-higher rules we have NOT silenced
        # in .zap/rules.tsv. allow_issue_writing=false skips creating an
        # issue (we read the artifact instead).
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:8080/"
          rules_file_name: ".zap/rules.tsv"
          allow_issue_writing: false
          fail_action: true
          cmd_options: "-T 5"

      - name: Stop container
        if: always()
        run: docker rm -f sd 2>/dev/null || true
