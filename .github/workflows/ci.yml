name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full git history for tag-based versioning

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Servicedesk.slnx

      - name: Build
        run: dotnet build Servicedesk.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Servicedesk.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: frontend (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Servicedesk.Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/Servicedesk.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    name: docker (image build + boot smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sd_ci
          POSTGRES_PASSWORD: ci_stub_password
          POSTGRES_DB: servicedesk_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sd_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs tags for the APP_VERSION build-arg fallback.

      - name: Derive APP_VERSION (SemVer for MinVer override)
        id: ver
        run: |
          # MinVer's --version-override needs a clean SemVer string. git describe
          # produces "v0.0.13-2-gSHA" which MinVer rejects (MINVER1005). We
          # synthesise a CI-scoped pre-release version from the latest tag.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE=${LATEST_TAG#v}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "value=${BASE}-ci.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.ver.outputs.value }}" \
            --tag servicedesk/app:ci \
            .

      - name: Boot container against service-postgres (full smoke)
        run: |
          # --network host lets the container reach the postgres service on
          # localhost:5432 exactly as a VPS install would reach native-host
          # Postgres. ASPNETCORE_URLS=:8080 stays the same — the runner's port
          # is free because GitHub Actions runners give us a fresh host.
          docker run -d --name sd \
            --network host \
            -e SERVICEDESK_ConnectionStrings__Postgres="Host=127.0.0.1;Port=5432;Database=servicedesk_ci;Username=sd_ci;Password=ci_stub_password" \
            -e SERVICEDESK_Audit__HashKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            -e SERVICEDESK_DataProtection__MasterKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            servicedesk/app:ci

          # Wait up to 60s for the app to boot, bootstrap schema, and answer.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/system/version > /dev/null; then
              echo "boot ok — /api/system/version responded"
              curl -fsS http://127.0.0.1:8080/api/system/version
              exit 0
            fi
            sleep 2
          done

          echo "boot failed — dumping logs:"
          docker logs sd
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f sd 2>/dev/null || true
