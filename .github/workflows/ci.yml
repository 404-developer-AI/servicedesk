name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full git history for tag-based versioning

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Servicedesk.slnx

      - name: Build
        run: dotnet build Servicedesk.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Servicedesk.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: frontend (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Servicedesk.Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/Servicedesk.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    name: docker (image build + boot smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs tags for the APP_VERSION build-arg fallback.

      - name: Derive APP_VERSION (SemVer for MinVer override)
        id: ver
        run: |
          # MinVer's --version-override needs a clean SemVer string. git describe
          # produces "v0.0.13-2-gSHA" which MinVer rejects (MINVER1005). We
          # synthesise a CI-scoped pre-release version from the latest tag.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE=${LATEST_TAG#v}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "value=${BASE}-ci.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.ver.outputs.value }}" \
            --tag servicedesk/app:ci \
            .

      - name: Boot container (expect healthcheck degraded — no DB on CI)
        run: |
          # Supply the three required SERVICEDESK_ secrets with dummy values so
          # StartupSecretValidator passes. Postgres is unreachable on CI, so
          # DatabaseBootstrapper will retry until we stop the container.
          docker run -d --name sd \
            -e SERVICEDESK_ConnectionStrings__Postgres="Host=127.0.0.1;Database=x;Username=x;Password=x" \
            -e SERVICEDESK_Audit__HashKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            -e SERVICEDESK_DataProtection__MasterKey="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" \
            -p 8080:8080 \
            servicedesk/app:ci

          # Give Kestrel a few seconds to bind :8080. We don't wait for healthy
          # because Postgres is unreachable — we only prove the image starts,
          # accepts a TCP connection, and serves the version endpoint.
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/system/version; then
              echo "boot ok"
              exit 0
            fi
            sleep 2
          done

          echo "boot failed — dumping logs:"
          docker logs sd
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f sd 2>/dev/null || true
